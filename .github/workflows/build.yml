name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools xvfb libx11-dev libxkbcommon-x11-0 libxtst6

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: yarn test

      - name: Test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum yarn test

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: yarn build:win --publish never

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: yarn build:linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loki-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: ignore

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.deb
            dist/*.AppImage
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
